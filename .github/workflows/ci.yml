name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build @nrl/types
        working-directory: packages/types
        run: npm install && npm run build
      - run: npm install
      - run: npm run lint
      - run: npm run build

  client:
    name: Client Lint + Typecheck + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build @nrl/types
        working-directory: packages/types
        run: npm install && npm run build
      - run: npm install
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
