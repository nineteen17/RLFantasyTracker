name: Deploy Production

on:
  workflow_run:
    workflows: ["Docker Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-<commit>)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve deploy metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "image_tag=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            input_tag="${{ github.event.inputs.image_tag }}"
            if [ -z "$input_tag" ]; then
              input_tag="latest"
            fi
            echo "image_tag=$input_tag" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Open Firewall for GitHub Actions
        run: |
          doctl auth init -t ${{ secrets.DIGITALOCEAN_TOKEN }}

          FIREWALL_NAME="rlfantasy-prod-fw"
          FIREWALL_ID=$(doctl compute firewall list --format ID,Name --no-header | grep "$FIREWALL_NAME" | awk '{print $1}')
          if [ -z "$FIREWALL_ID" ]; then
            echo "Firewall $FIREWALL_NAME not found!"
            exit 1
          fi
          echo "FIREWALL_ID=$FIREWALL_ID" >> $GITHUB_ENV
          doctl compute firewall add-rules $FIREWALL_ID --inbound-rules "protocol:tcp,ports:22,address:0.0.0.0/0"
          
          echo "Waiting for firewall rule to propagate..."
          for i in {1..12}; do
            if nc -z -w 5 ${{ secrets.DROPLET_HOST }} 22 2>/dev/null; then
              echo "Port 22 is reachable!"
              break
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Sync deploy assets to droplet
        run: |
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            -r deploy ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/opt/rlfantasy/

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o StrictHostKeyChecking=no \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail

          if [ ! -f /opt/rlfantasy/.env ]; then
            echo "Missing /opt/rlfantasy/.env"
            exit 1
          fi

          cd /opt/rlfantasy

          export IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          export API_IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rlfantasy-api:${IMAGE_TAG}"
          export WEB_IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/rlfantasy-web:${IMAGE_TAG}"

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          docker compose -f deploy/compose/compose.prod.yml --env-file /opt/rlfantasy/.env config >/dev/null
          docker compose -f deploy/compose/compose.prod.yml --env-file /opt/rlfantasy/.env pull api worker web
          docker compose -f deploy/compose/compose.prod.yml --env-file /opt/rlfantasy/.env up -d --remove-orphans

          docker compose -f deploy/compose/compose.prod.yml --env-file /opt/rlfantasy/.env ps
          APP_DOMAIN="$(grep '^APP_DOMAIN=' /opt/rlfantasy/.env | cut -d '=' -f2-)"
          API_DOMAIN="$(grep '^API_DOMAIN=' /opt/rlfantasy/.env | cut -d '=' -f2-)"
          curl -fsS -H "Host: ${APP_DOMAIN}" http://127.0.0.1/ >/dev/null
          curl -fsS -H "Host: ${API_DOMAIN}" http://127.0.0.1/health >/dev/null
          docker image prune -f
          DEPLOY_SCRIPT

      - name: Close Firewall for GitHub Actions
        if: always()
        run: |
          doctl auth init -t ${{ secrets.DIGITALOCEAN_TOKEN }}

          if [ -n "${{ env.FIREWALL_ID }}" ]; then
            doctl compute firewall remove-rules ${{ env.FIREWALL_ID }} --inbound-rules "protocol:tcp,ports:22,address:0.0.0.0/0"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
