name: Docker Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      API_DOMAIN: ${{ vars.API_DOMAIN || 'api.footybreakevens.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Missing repository secrets DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN"
            echo "Set them at repo scope (not only environment scope)."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/api.Dockerfile
          push: true
          no-cache: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:latest
          provenance: true
          sbom: true

      - name: Build and push Web image
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/web.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ env.API_DOMAIN }}
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:latest
          provenance: true
          sbom: true

      - name: Scan API image (Trivy)
        run: |
          docker run --rm \
            -v "$HOME/.docker:/root/.docker:ro" \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 1 \
            docker.io/${DOCKERHUB_USERNAME}/rlfantasy-api:sha-${GITHUB_SHA}

      - name: Scan Web image (Trivy)
        run: |
          docker run --rm \
            -v "$HOME/.docker:/root/.docker:ro" \
            aquasec/trivy:latest \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 1 \
            docker.io/${DOCKERHUB_USERNAME}/rlfantasy-web:sha-${GITHUB_SHA}

      - name: Emit image digests
        run: |
          echo "API digest: ${{ steps.build_api.outputs.digest }}"
          echo "Web digest: ${{ steps.build_web.outputs.digest }}"
