name: Docker Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Missing repository secrets DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN"
            echo "Set them at repo scope (not only environment scope)."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/api.Dockerfile
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:latest
          provenance: true
          sbom: true

      - name: Build and push Web image
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/web.Dockerfile
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:latest
          provenance: true
          sbom: true

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:sha-${{ github.sha }}
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          format: "table"
          exit-code: "1"

      - name: Scan Web image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:sha-${{ github.sha }}
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          format: "table"
          exit-code: "1"

      - name: Emit image digests
        run: |
          echo "API digest: ${{ steps.build_api.outputs.digest }}"
          echo "Web digest: ${{ steps.build_web.outputs.digest }}"
