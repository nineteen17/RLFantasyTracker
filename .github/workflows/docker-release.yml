name: Docker Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      API_DOMAIN: ${{ vars.API_DOMAIN || 'api.footybreakevens.com' }}
      # Public GA4 measurement ID (not a secret). This is baked into the Next.js web build.
      NEXT_PUBLIC_GA_MEASUREMENT_ID: G-8BYXT95NP9
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Missing repository secrets DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN"
            echo "Set them at repo scope (not only environment scope)."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/api.Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:latest
          provenance: true
          sbom: true

      - name: Build and push Web image
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/web.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ env.API_DOMAIN }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:sha-${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:latest
          provenance: true
          sbom: true

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          TRIVY_PASSWORD: ${{ env.DOCKERHUB_TOKEN }}
        with:
          image-ref: docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-api:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan Web image (Trivy)
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          TRIVY_PASSWORD: ${{ env.DOCKERHUB_TOKEN }}
        with:
          image-ref: docker.io/${{ env.DOCKERHUB_USERNAME }}/rlfantasy-web:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Emit image digests
        run: |
          echo "API digest: ${{ steps.build_api.outputs.digest }}"
          echo "Web digest: ${{ steps.build_web.outputs.digest }}"
