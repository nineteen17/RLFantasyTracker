name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/envs/prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Check DigitalOcean token
        id: token_check
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: |
          if [ -n "$DIGITALOCEAN_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "DIGITALOCEAN_TOKEN is not set; skipping terraform plan step."
          fi

      - name: Terraform plan
        if: ${{ steps.token_check.outputs.has_token == 'true' }}
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: |
          terraform plan -input=false \
            -var='region=syd1' \
            -var='droplet_size=s-1vcpu-2gb' \
            -var='ssh_key_fingerprints=[]' \
            -var='enable_cloudflare_origin_lock=false'
