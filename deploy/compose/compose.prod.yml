services:
  traefik:
    image: traefik:v3.3
    container_name: rlfantasy-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:?set CF_DNS_API_TOKEN}
    command:
      - --global.sendanonymoususage=false
      - --global.checknewversion=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?set TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --api.dashboard=false
      - --log.level=INFO
      - --accesslog=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - ../traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - edge

  api:
    image: docker.io/${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/rlfantasy-api:latest
    container_name: rlfantasy-api
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=https://${APP_DOMAIN:?set APP_DOMAIN}
      - BASE_URL=https://${API_DOMAIN:?set API_DOMAIN}
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-1h}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-7d}
      - ENABLE_SCHEDULER=false
      - FOOTY_STATS_COOKIE=${FOOTY_STATS_COOKIE:-}
      - FOOTY_STATS_XSRF_TOKEN=${FOOTY_STATS_XSRF_TOKEN:-}
      - FOOTY_STATS_USER_AGENT=${FOOTY_STATS_USER_AGENT:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - api_logs:/app/logs
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.routers.api.middlewares=secure-headers@file,compression@file
      - traefik.http.services.api.loadbalancer.server.port=5000
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - edge

  worker:
    image: docker.io/${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/rlfantasy-api:latest
    container_name: rlfantasy-worker
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m
    command: ["node", "dist/worker/run-scheduler.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL}
      - ENABLE_SCHEDULER=true
      - FOOTY_STATS_COOKIE=${FOOTY_STATS_COOKIE:-}
      - FOOTY_STATS_XSRF_TOKEN=${FOOTY_STATS_XSRF_TOKEN:-}
      - FOOTY_STATS_USER_AGENT=${FOOTY_STATS_USER_AGENT:-}
    volumes:
      - worker_logs:/app/logs
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge

  web:
    image: docker.io/${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/rlfantasy-web:latest
    container_name: rlfantasy-web
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${API_DOMAIN:?set API_DOMAIN}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.routers.web.middlewares=secure-headers@file,compression@file
      - traefik.http.services.web.loadbalancer.server.port=3000
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge

  watchtower:
    image: containrrr/watchtower:latest
    container_name: rlfantasy-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_ROLLING_RESTART=true
      - REPO_USER=${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}
      - REPO_PASS=${DOCKERHUB_TOKEN:?set DOCKERHUB_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge

networks:
  edge:
    driver: bridge

volumes:
  traefik_letsencrypt:
  api_logs:
  worker_logs:
